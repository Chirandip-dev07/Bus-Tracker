<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Where Is My Bus</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Area -->
            <div class="logo-area">
                <div class="logo-circle">
                    <span>🚌</span>
                </div>
                <h1 class="app-name">Where Is My Bus</h1>
                <p class="tagline">Never miss your bus again</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" novalidate>
                <div class="input-group">
                    <label for="identifier">Email or Phone Number</label>
                    <input 
                        type="text" 
                        id="identifier" 
                        name="identifier" 
                        placeholder="you@example.com or 9876543210"
                        autocomplete="username"
                    >
                    <span class="error-message" id="identifier-error"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="password-error"></span>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember Me</span>
                    </label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="spinner" id="spinner" style="display:none;"></span>
                </button>
            </form>

            <div class="extra-links">
                <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                <p class="register-text">
                    Don't have an account? <a href="pages/register.html" class="register-link">Register</a>
                </p>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
